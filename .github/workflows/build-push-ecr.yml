name: 'Terraform and Docker CI/CD'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: 'Terraform and Docker CI/CD'
    runs-on: ubuntu-latest
    environment: aws

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format and Validate
      run: |
        terraform fmt -check
        terraform validate

    - name: Create terraform.tfvars
      run: |
        cat > terraform.tfvars <<EOF
        repository_name = "felixdusengimana-demo-repo"
        EOF

    - name: Import Existing ECR Repository (if exists)
      run: |
        terraform import aws_ecr_repository.demo_repo felixdusengimana-demo-repo 2>/dev/null || echo "Repository not yet in state (first run)"
      continue-on-error: true

    - name: Terraform Plan
      run: terraform plan -input=false -out=tfplan

    - name: Comment PR with Terraform Plan
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const { execSync } = require('child_process');
          const plan = execSync('terraform show tfplan').toString();
          const truncatedPlan = plan.length > 3000 ? plan.substring(0, 3000) + '\n... (truncated)' : plan;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 📋 Terraform Plan\n\`\`\`\n${truncatedPlan}\n\`\`\``
          });

    - name: Terraform Apply
      if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
      run: terraform apply -input=false tfplan

    - name: Export Terraform Outputs
      id: tf_outputs
      run: |
        # Get raw outputs and clean up terraform UI and debug output
        REPO_URL=$(terraform output -raw repository_url 2>&1 | sed 's/::debug::.*//' | grep -v "^╷" | grep -v "^│" | grep -v "^└" | grep "\.amazonaws\.com" | tail -1)
        LOGIN_CMD=$(terraform output -raw docker_login_command 2>&1 | sed 's/::debug::.*//' | grep "aws ecr" | tail -1)
        
        # Clean up any remaining whitespace
        REPO_URL=$(echo "$REPO_URL" | xargs)
        LOGIN_CMD=$(echo "$LOGIN_CMD" | xargs)
        
        if [ -z "$REPO_URL" ] || [ -z "$LOGIN_CMD" ]; then
          echo "❌ ERROR: Failed to get terraform outputs"
          echo "REPO_URL: [$REPO_URL]"
          echo "LOGIN_CMD: [$LOGIN_CMD]"
          exit 1
        fi
        
        echo "repository_url=$REPO_URL" >> $GITHUB_OUTPUT
        echo "docker_login_command=$LOGIN_CMD" >> $GITHUB_OUTPUT
        
        echo "✅ Terraform outputs exported"

    - name: Validate Outputs
      if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
      run: |
        echo "🔍 Checking terraform outputs..."
        echo "Repository URL: ${{ steps.tf_outputs.outputs.repository_url }}"
        echo "Docker Login: ${{ steps.tf_outputs.outputs.docker_login_command }}"
        
        if [ -z "${{ steps.tf_outputs.outputs.repository_url }}" ]; then
          echo "❌ ERROR: Failed to get repository URL"
          exit 1
        fi
        
        if [ -z "${{ steps.tf_outputs.outputs.docker_login_command }}" ]; then
          echo "❌ ERROR: Failed to get docker login command"
          exit 1
        fi
        
        echo "✅ Outputs validated"

    - name: Login to Amazon ECR
      if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
      run: |
        eval "${{ steps.tf_outputs.outputs.docker_login_command }}"
        echo "✅ Successfully logged in to ECR"

    - name: Build Docker Image
      if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
      run: |
        IMAGE_TAG="latest"
        
        echo "🐳 Building Docker image..."
        echo "Repository URL: ${{ steps.tf_outputs.outputs.repository_url }}"
        echo "Image Tag: $IMAGE_TAG"
        
        docker build -t "${{ steps.tf_outputs.outputs.repository_url }}:$IMAGE_TAG" .

    - name: Push Docker Image to ECR
      if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
      run: |
        IMAGE_TAG="latest"
        
        echo "📤 Pushing to ECR..."
        docker push "${{ steps.tf_outputs.outputs.repository_url }}:$IMAGE_TAG"
        echo "✅ Docker image pushed to ECR: ${{ steps.tf_outputs.outputs.repository_url }}:$IMAGE_TAG"
        
        # Write to job summary
        echo "## Docker Image Successfully Pushed" >> $GITHUB_STEP_SUMMARY
        echo "Image URI: \`${{ steps.tf_outputs.outputs.repository_url }}:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
