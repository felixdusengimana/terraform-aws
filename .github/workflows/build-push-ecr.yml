name: 'Terraform and Docker CI/CD'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: aws

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format and Validate
      run: |
        terraform fmt -check
        terraform validate

    - name: Create terraform.tfvars
      run: |
        cat > terraform.tfvars <<EOF
        repository_name = "felixdusengimana-demo-repo"
        EOF

    - name: Import Existing ECR Repository (if exists)
      run: |
        terraform import aws_ecr_repository.demo_repo felixdusengimana-demo-repo 2>/dev/null || echo "Repository not yet in state (first run)"
      continue-on-error: true

    - name: Terraform Plan
      run: terraform plan -input=false -out=tfplan

    - name: Comment PR with Terraform Plan
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const { execSync } = require('child_process');
          const plan = execSync('terraform show tfplan').toString();
          const truncatedPlan = plan.length > 3000 ? plan.substring(0, 3000) + '\n... (truncated)' : plan;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 📋 Terraform Plan\n\`\`\`\n${truncatedPlan}\n\`\`\``
          });

    - name: Terraform Apply
      if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
      run: terraform apply -input=false tfplan

  build-and-push:
    name: 'Build and Push Docker'
    needs: terraform
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: aws

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Terraform Init
      run: terraform init

    - name: Get Terraform Outputs
      run: |
        echo "🔍 Getting terraform outputs..."
        
        # Get raw outputs, filtering out terraform UI elements
        ECR_REPOSITORY_URL=$(terraform output -raw repository_url 2>&1 | grep -v "^╷" | grep -v "^│" | grep -v "^└" | grep "\.amazonaws\.com" | tail -1)
        DOCKER_LOGIN_CMD=$(terraform output -raw docker_login_command 2>&1 | grep "aws ecr" | tail -1)
        
        # Validate before writing
        if [ -z "$ECR_REPOSITORY_URL" ] || [ -z "$DOCKER_LOGIN_CMD" ]; then
          echo "❌ ERROR: Failed to get terraform outputs"
          echo "ECR_REPOSITORY_URL: [$ECR_REPOSITORY_URL]"
          echo "DOCKER_LOGIN_CMD: [$DOCKER_LOGIN_CMD]"
          exit 1
        fi
        
        echo "ECR_REPOSITORY_URL=$ECR_REPOSITORY_URL" >> $GITHUB_ENV
        echo "DOCKER_LOGIN_CMD=$DOCKER_LOGIN_CMD" >> $GITHUB_ENV
        
        echo "✅ Terraform outputs loaded successfully"

    - name: Validate Outputs
      run: |
        echo "🔍 Checking outputs..."
        
        if [ -z "$ECR_REPOSITORY_URL" ]; then
          echo "❌ ERROR: Failed to get repository URL"
          exit 1
        fi
        
        if [ -z "$DOCKER_LOGIN_CMD" ]; then
          echo "❌ ERROR: Failed to get docker login command"
          exit 1
        fi
        
        echo "✅ Outputs validated"
        echo "Repository URL: $ECR_REPOSITORY_URL"

    - name: Login to Amazon ECR
      run: |
        eval "$DOCKER_LOGIN_CMD"
        echo "✅ Successfully logged in to ECR"

    - name: Build Docker Image
      run: |
        IMAGE_TAG="latest"
        
        echo "🐳 Building Docker image..."
        echo "Repository URL: $ECR_REPOSITORY_URL"
        echo "Image Tag: $IMAGE_TAG"
        
        docker build -t $ECR_REPOSITORY_URL:$IMAGE_TAG .

    - name: Push Docker Image to ECR
      run: |
        IMAGE_TAG="latest"
        
        echo "📤 Pushing to ECR..."
        docker push $ECR_REPOSITORY_URL:$IMAGE_TAG
        echo "✅ Docker image pushed to ECR: $ECR_REPOSITORY_URL:$IMAGE_TAG"
        
        # Write to job summary
        echo "## Docker Image Successfully Pushed" >> $GITHUB_STEP_SUMMARY
        echo "Image URI: \`$ECR_REPOSITORY_URL:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
