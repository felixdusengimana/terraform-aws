name: 'Terraform and Docker CI/CD'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: aws

    defaults:
      run:
        shell: bash

    outputs:
      repository_url: ${{ steps.terraform_output.outputs.repository_url }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Debug AWS Credentials
      run: |
        echo "Checking AWS credentials..."
        if [ -z "$AWS_ACCESS_KEY_ID" ]; then
          echo "❌ AWS_ACCESS_KEY_ID not found"
          exit 1
        else
          echo "✅ AWS_ACCESS_KEY_ID is set"
        fi
        if [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
          echo "❌ AWS_SECRET_ACCESS_KEY not found"
          exit 1
        else
          echo "✅ AWS_SECRET_ACCESS_KEY is set"
        fi
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Create terraform.tfvars
      run: |
        cat > terraform.tfvars <<EOF
        repository_name = "felixdusengimana-demo-repo"
        EOF
        cat terraform.tfvars

    - name: Terraform Plan
      run: terraform plan -input=false -out=tfplan

    - name: Terraform Plan Output
      if: github.event_name == 'pull_request'
      run: terraform show tfplan > tfplan.txt

    - name: Comment PR with Terraform Plan
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('tfplan.txt', 'utf8') || 'Plan file not available';
          const truncatedPlan = plan.length > 3000 ? plan.substring(0, 3000) + '\n... (truncated)' : plan;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 📋 Terraform Plan\n\`\`\`\n${truncatedPlan}\n\`\`\``
          });

    - name: Import Existing ECR Repository (if exists)
      if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
      run: |
        terraform state rm aws_ecr_repository.demo_repo 2>/dev/null || true
        terraform import aws_ecr_repository.demo_repo felixdusengimana-demo-repo 2>/dev/null || echo "Repository not yet in state (first run)"
      continue-on-error: true

    - name: Terraform Apply
      if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
      run: terraform apply -input=false tfplan

    - name: Mask Terraform Secrets
      if: (github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
      run: |
        terraform output -json | jq -r 'to_entries[] | select(.value.sensitive == true) | .value.value' | while read -r line; do
          if [ ! -z "$line" ]; then
            echo "::add-mask::$line"
          fi
        done

    - name: Get Terraform Output
      id: terraform_output
      if: (github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
      run: |
        REPO_URL=$(terraform output -raw repository_url)
        echo "repository_url=$REPO_URL" >> $GITHUB_OUTPUT
        echo "✅ ECR Repository URL obtained"

  build-and-push:
    name: 'Build and Push Docker'
    needs: terraform
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: aws

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      env:
        ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.repository_url }}
      run: |
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $(echo $ECR_REPOSITORY_URL | cut -d/ -f1)

    - name: Build Docker image
      id: build-image
      env:
        ECR_REPOSITORY_URL: ${{ needs.terraform.outputs.repository_url }}
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REPOSITORY_URL:$IMAGE_TAG .
        echo "image=$ECR_REPOSITORY_URL:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Push Docker image to ECR
      env:
        IMAGE: ${{ steps.build-image.outputs.image }}
      run: |
        docker push $IMAGE
        echo "✅ Docker image pushed to ECR"

    - name: Print Image URI
      env:
        IMAGE_URI: ${{ steps.build-image.outputs.image }}
      run: |
        echo "## Docker Image Successfully Pushed" >> $GITHUB_STEP_SUMMARY
        echo "Image URI: \`$IMAGE_URI\`" >> $GITHUB_STEP_SUMMARY
