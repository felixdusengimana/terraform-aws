- hosts: webservers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
    - name: Install nginx
      apt:
        name: nginx
        state: latest
    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: yes
    - name: Create index.html
      copy:
        dest: /var/www/html/index.html
        content: |
          <html>
          <body>
          <h1>Hello World, from Ansible!</h1>
          </body>
          </html>
        owner: www-data
        group: www-data
        mode: '0644'
    - name: Open port 80 in UFW
      ufw:
        rule: allow
        port: 80
        proto: tcp
    - name: Check nginx status
      service:
        name: nginx        
        state: started
