- hosts: webservers
  become: yes
  vars:
    # Read all sensitive values from environment variables
    aws_region: "{{ lookup('env', 'AWS_REGION') | default('us-east-1') }}"
    ecr_repository_url: "{{ lookup('env', 'ECR_REPOSITORY_URL') }}"
    image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest') }}"
    container_name: "{{ lookup('env', 'CONTAINER_NAME') | default('myapp') }}"
    container_port: "{{ lookup('env', 'CONTAINER_PORT') | default('80') }}"
    host_port: "{{ lookup('env', 'HOST_PORT') | default('80') }}"
    # Docker environment variables - read from env file
    docker_env_vars: "{{ lookup('env', 'DOCKER_ENV_VARS') | default('APP_ENV=production').split(',') }}"
  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      shell: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg

    - name: Add Docker repository
      shell: echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null

    - name: Update apt cache again
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Install pip
      apt:
        name: python3-pip
        state: present

    - name: Install AWS CLI v2 via pip
      pip:
        name: awscli
        state: present
        executable: pip3

    - name: Login to ECR
      shell: aws ecr get-login-password --region {{ aws_region }} | docker login --username AWS --password-stdin {{ ecr_repository_url.split('/')[0] }}
      environment:
        AWS_DEFAULT_REGION: "{{ aws_region }}"

    - name: Pull Docker image from ECR
      shell: docker pull {{ ecr_repository_url }}:{{ image_tag }}

    - name: Run Docker container
      shell: |
        docker run -d \
        -p {{ host_port }}:{{ container_port }} \
        --name {{ container_name }} \
        {% for env_var in docker_env_vars %}-e {{ env_var }} {% endfor %}\
        {{ ecr_repository_url }}:{{ image_tag }}
